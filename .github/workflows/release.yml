# Godot EventSheets release pipeline.
# Push a tag like v0.2.0 (or run manually with a version) and this workflow:
#   1. runs the test gate (same as CI),
#   2. stamps the tag version into plugin.cfg,
#   3. packages two zips:
#        godot-eventsheets-<version>.zip          → addons/ only (Asset Library / drop-in layout)
#        godot-eventsheets-samples-<version>.zip  → eventsheet_addons/ + demo/ (behaviors, themes)
#   4. publishes a GitHub Release with generated notes and both zips attached.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0) — tag v<version> must exist or will be created from this ref"
        required: true

permissions:
  contents: write

env:
  # Match the version the plugin is developed + tested on (kept in sync with ci.yml).
  GODOT_VERSION: "4.7"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Download Godot ${{ env.GODOT_VERSION }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          curl -fsSL -o ~/godot/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q ~/godot/godot.zip -d ~/godot
          mv ~/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot/godot
          chmod +x ~/godot/godot

      - name: Test gate
        run: |
          ~/godot/godot --headless --import --path . 2>&1 | tee import.log
          ! grep -E 'SCRIPT ERROR|Parse Error' import.log
          ~/godot/godot --headless --path . --script tests/run_perf.gd

      - name: Stage plugin package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p stage/plugin stage/samples
          cp -r addons stage/plugin/addons
          cp README.md LICENSE CHANGELOG.md stage/plugin/
          # Stamp the released version into plugin.cfg (staged copy only).
          sed -i "s/^version=.*/version=\"$VERSION\"/" stage/plugin/addons/eventforge/plugin.cfg
          cp -r eventsheet_addons stage/samples/eventsheet_addons
          cp -r demo stage/samples/demo
          cp README.md LICENSE stage/samples/
          (cd stage/plugin  && zip -qr "../../godot-eventsheets-$VERSION.zip" .)
          (cd stage/samples && zip -qr "../../godot-eventsheets-samples-$VERSION.zip" .)
          ls -lh godot-eventsheets-*.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.version.outputs.version) || github.ref_name }}
          name: Godot EventSheets ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            godot-eventsheets-${{ steps.version.outputs.version }}.zip
            godot-eventsheets-samples-${{ steps.version.outputs.version }}.zip
