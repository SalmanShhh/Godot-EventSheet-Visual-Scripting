; Construct-inspired EventSheet theme package template
; Duplicate this file together with designer_template_theme.tres when creating a new shipped theme.

[package]
name="Designer Template Theme"
style_resource="res://demo/themes/designer_template_theme.tres"

[construct_css_inspiration]
source="Construct 3 theme.css"
notes="Use the token names below as the Godot-native equivalent of CSS variables/selectors."

[tokens]
sheet_background="event_style.sheet_background_color"
event_background="event_style.row_background_color"
event_border="event_style.row_border_color"
condition_lane_background="event_style.condition_lane_color"
action_lane_background="event_style.action_lane_color"
condition_badge_column_width="event_style.condition_badge_column_width"
group_background="event_style.group_background_color"
comment_background="event_style.comment_row_background_color"
selection_fill="event_style.selection_fill_color"
hover_fill="event_style.hover_fill_color"
condition_entry_background="condition_style.chip_background_color"
action_entry_background="action_style.chip_background_color"

[designer_notes]
starting_point="Open the .tres in the inspector and tune the token fields; the editor repaints from them directly."
construct_like_target="construct3_stacked_theme.tres shows a more opinionated Construct-style baseline."
